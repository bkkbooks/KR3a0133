body:
  text: 厲學移告縣屬學所以定情理性而積衆善者也情定於內而行成於外積善於心而名顯於教故中人之性隨教而移善積則習與性成唐虞之時皆比屋而可封及其廢也而云可誅豈非化以成俗教移人心者哉自漢氏失御天下分崩江表寇隔久替王教庠序之訓廢而莫修今四海一統萬里同軌熙熙兆庶咸休息乎太和之中宜崇尚道素廣開學業以讚協時雍光揚盛化晉書虞溥傳獎訓諸生誥文學諸生皆冠帶之流年盛志美始涉學庭講修典訓此大成之業立德之基也夫聖人之道淡而寡味故始學者不好也及至期月所觀彌博所習彌多日聞所未聞日見所不見然後心開意朗敬業樂群忽然不覺大化之陶己至道之入神也故學之染人甚於丹青丹青吾見久而渝矣未見久學而渝者也夫工人之染先修其質後事其色質修色積而染工畢矣學亦有質孝悌忠信是也君子內正其心外修其行行有餘力則以學文文質彬彬然後為德夫學者不患才不及而患志不立故曰希驥之馬亦驥之乘希顏之徒亦顏之倫也又曰鍥而舍之朽木不知鍥而不舍金石可虧斯非其效乎今諸生口誦聖人之典體間庠序之訓比及三年可以小成而令名宣流雅譽日新朋友欽而樂之朝士敬而歎之於是州府交命擇官而仕不亦美乎若乃含章舒藻揮翰流離稱述世務探賾究奇使揚班韜筆仲舒結舌亦惟才所居固無常人也然積一勺以成江河纍微塵以崇峻極匪志匪勤理無由濟也諸生若絶人間之務心專親學纍一以貫之積漸以進之則亦或遲或速或先或後耳何滯而不通何遠而不至邪同上
